name: Firmware Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history with tags: PROJECT_VER comes from `git describe`,
          # so the app descriptor version must resolve to the release tag
          fetch-depth: 0

      - name: Build debug firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32
          command: idf.py -B build_debug -DSDKCONFIG=build_debug/sdkconfig -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.debug" build

      - name: Build release firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32
          command: idf.py -B build_release -DSDKCONFIG=build_release/sdkconfig -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.release" build

      - name: Get version from tag
        id: get_version
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Rename firmware files with meaningful names
        run: |
          TAG="${{ steps.get_version.outputs.TAG_NAME }}"

          cp build_debug/ago_slider.bin                          "ago_slider_${TAG}_debug_16mb_fw.bin"
          cp build_debug/partition_table/partition-table.bin     "ago_slider_${TAG}_debug_16mb_pt.bin"
          cp build_debug/bootloader/bootloader.bin               "ago_slider_${TAG}_debug_16mb_bl.bin"
          cp build_debug/ota_data_initial.bin                    "ago_slider_${TAG}_debug_16mb_od.bin"

          cp build_release/ago_slider.bin                        "ago_slider_${TAG}_release_16mb_fw.bin"
          cp build_release/partition_table/partition-table.bin   "ago_slider_${TAG}_release_16mb_pt.bin"
          cp build_release/bootloader/bootloader.bin             "ago_slider_${TAG}_release_16mb_bl.bin"
          cp build_release/ota_data_initial.bin                  "ago_slider_${TAG}_release_16mb_od.bin"

      - name: List final artifacts
        run: |
          echo "=== Final firmware files ==="
          ls -la *.bin
          echo ""
          echo "=== File sizes ==="
          du -h *.bin

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_debug_16mb_fw.bin
            ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_debug_16mb_pt.bin
            ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_debug_16mb_bl.bin
            ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_debug_16mb_od.bin
            ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_release_16mb_fw.bin
            ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_release_16mb_pt.bin
            ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_release_16mb_bl.bin
            ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_release_16mb_od.bin
          tag_name: ${{ steps.get_version.outputs.TAG_NAME }}
          name: Release ${{ steps.get_version.outputs.TAG_NAME }}
          body: |
            # AGO Slider ESP32 Firmware

            **Version:** ${{ steps.get_version.outputs.TAG_NAME }}
            **Build date:** ${{ github.event.head_commit.timestamp }}

            ## Available Firmware Images

            ### 🐞 Debug Version (verbose logging)
            **16MB Flash:**
            - `ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_debug_16mb_fw.bin` - Firmware (application)
            - `ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_debug_16mb_pt.bin` - Partition table
            - `ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_debug_16mb_bl.bin` - Bootloader
            - `ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_debug_16mb_od.bin` - OTA data (initial)

            ```bash
            esptool.py --chip esp32 --baud 921600 write_flash --flash-mode dio --flash-size 16MB \
            0x1000  ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_debug_16mb_bl.bin \
            0x8000  ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_debug_16mb_pt.bin \
            0xe000  ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_debug_16mb_od.bin \
            0x10000 ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_debug_16mb_fw.bin
            ```

            ### 🚀 Production Version (optimized, -Os)
            **16MB Flash:**
            - `ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_release_16mb_fw.bin` - Firmware (application)
            - `ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_release_16mb_pt.bin` - Partition table
            - `ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_release_16mb_bl.bin` - Bootloader
            - `ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_release_16mb_od.bin` - OTA data (initial)

            ```bash
            esptool.py --chip esp32 --baud 921600 write_flash --flash-mode dio --flash-size 16MB \
            0x1000  ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_release_16mb_bl.bin \
            0x8000  ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_release_16mb_pt.bin \
            0xe000  ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_release_16mb_od.bin \
            0x10000 ago_slider_${{ steps.get_version.outputs.TAG_NAME }}_release_16mb_fw.bin
            ```

            ## Notes
            - **Debug version** logs at DEBUG level over the serial port
            - **Production version** is optimized for size (-Os), logs at INFO level
            - The `*_fw.bin` (application) file is also what the Android app uploads over BLE OTA
            - When flashing over cable, use all four images of the chosen variant at the offsets above
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
